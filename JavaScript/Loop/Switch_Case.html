<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let a = prompt("How many chai you can drink");

      switch (a) {
        case "1":
          document.write("One cup chai ☕");
          break;
        case "2":
          document.write("Two cup chai ☕");
          break;
        case "3":
          document.write("Three cup chai ☕");
          break;
        case "4":
          document.write("Four cup chai ☕");
          break;
        case "5":
          document.write("five cup chai ☕");
          break;
        default:
          document.write("Chai ban rahi hai wait kar na padega");
      }
    </script>
  </body>
</html>
