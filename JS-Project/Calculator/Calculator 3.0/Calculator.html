<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 bg-dark text-white p-4 m-auto text-center">
          <h2>JavaScript Marks Project</h2>
        </div>
      </div>
      <div class="row">
        <div
          class="col-lg-8 m-auto d-flex justify-content-between align-items-center"
        >
          <div class="col-lg-7 font-weight-bold">
            <div class="maths">
              <label class="form-control-label mt-5">Maths</label>
              <input type="number" name="" class="form-control" id="maths" />
            </div>
            <div class="sci mb-3">
              <label class="form-control-label">Science</label>
              <input type="number" name="" class="form-control" id="sci" />
            </div>
            <div class="eng mb-3">
              <label class="form-control-label">English</label>
              <input type="number" name="" class="form-control" id="eng" />
            </div>
            <div class="guj mb-3">
              <label class="form-control-label">Gujrati</label>
              <input type="number" name="" class="form-control" id="guj" />
            </div>
            <div class="ss mb-3">
              <label class="form-control-label">SS</label>
              <input type="number" name="" class="form-control" id="ss" />
            </div>
            <button class="btn btn-warning" onclick="calculate()">Total</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
