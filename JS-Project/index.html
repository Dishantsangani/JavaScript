<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS-Validation</title>
    <style>
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      input {
        width: 600px;
        padding: 10px;
      }
      .succ {
        border: 5px solid green;
        outline: none;
      }
      .fail {
        border: 5px solid red;
        outline: none;
      }
    </style>
  </head>
  <body>
    <input
      type="text"
      id="user"
      placeholder="Enter Your Name"
      onkeyup="web();"
    />
    <script>
      function web() {
        var a = document.getElementById("user").value;
        var b = /^[A-Za-z0-9@#$%& ]{5,15}$/;

        if (b.test(a)) {
          document.querySelector("#user").classList = "succ";
        } else {
          document.querySelector("#user").classList = "fail";
        }
      }
    </script>
  </body>
</html>
