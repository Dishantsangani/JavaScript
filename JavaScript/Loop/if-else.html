<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>If - else statement</title>
  </head>
  <body>
    <script>
      var age = prompt("enter your Age");
      if (age >= 120 && age <= 100) {
        document.write("Is very very old");
      } else if (age >= 100 && age <= 60) {
        document.write("Is  very old");
      } else if (age >= 30 && age <= 60) {
        document.write("Is young");
      } else if (age >= 15 && age <= 30) {
        document.write("Is very  young");
      } else if (age >= 7 && age <= 15) {
        document.write("Is child");
      } else if (age <= 7) {
        document.write("Is baby");
      } else {
        document.write("enter valid age");
      }
    </script>
  </body>
</html>
