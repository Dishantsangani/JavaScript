<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foreach loop</title>
  </head>
  <body>
    <script>
      var a = ["a", "b", "c", "d", "e", "f"];
      document.write(a);

      a.forEach(function (index, value) {
        document.write(index + ": " + value + "<br/>");
      });
    </script>
  </body>
</html>
