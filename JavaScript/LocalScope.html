<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local & Global Scope</title>
  </head>
  <body>
    <p>Local & Global Scope</p>
    <script>
      for (var dev = 0; dev <= 20; dev++) {
        document.write(dev);
      }
      //   console.log(dev);

      //   Block Scope
      for (let dev1 = 0; dev1 <= 20; dev1++) {
        document.write(dev1);
      }
      console.log(dev1);

      for (const dev2 = 0; dev2 <= 20; dev2++) {
        document.write(dev2);
      }
      console.log(dev2);
    </script>
  </body>
</html>
