<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marks Checker</title>
    <style>
      .form {
        width: 100%;
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
      }

      input {
        width: 300px;
      }

      .btn-submit {
        padding: 10px;
        float: left;
      }

      .btn-cancel {
        padding: 10px;
        float: left;
      }

      table {
        background-color: rgb(245, 245, 199);
        border: 1;
      }
    </style>
  </head>

  <body>
    <div class="form">
      <input type="text" id="English" placeholder="English" />
      <input type="text" id="Hindi" placeholder="Hindi" />
      <input type="text" id="Gujarati" placeholder="Gujarati" />
      <input type="text" id="Maths" placeholder="Maths" />

      <button class="btn-submit" onclick="vali();">Submit</button>
    </div>
    <center>
      <table cellpadding="5">
        <tr>
          <td>Total</td>
          <td>400</td>
        </tr>
        <tr>
          <td>get</td>
          <td id="total"></td>
        </tr>
        <tr>
          <td>Avg</td>
          <td id="avg"></td>
        </tr>

        <tr>
          <td>PF</td>
          <td id="pf"></td>
        </tr>
        <tr>
          <td>Grade</td>
          <td id="grade"></td>
        </tr>
      </table>
    </center>

    <script>
      function vali() {
        var a = parseInt(document.getElementById("English").value);
        var b = parseInt(document.getElementById("Hindi").value);
        var c = parseInt(document.getElementById("Gujarati").value);
        var d = parseInt(document.getElementById("Maths").value);

        if (a >= 100 || b >= 100 || c >= 100 || d >= 100) {
          alert("Enter Valid Value");
        } else {
          var sum = a + b + c + d;
          document.getElementById("total").innerHTML = sum;

          var per = (sum / 400) * 100;
          document.getElementById("avg").innerHTML = per;

          if (a >= 35 && b >= 35 && c >= 35 && d >= 35) {
            document.getElementById("pf").innerHTML = "pass";
          } else {
            document.getElementById("pf").innerHTML = "fail";
          }

          if (per >= 90) {
            document.getElementById("grade").innerHTML = "A+";
          } else if (per >= 80) {
            document.getElementById("grade").innerHTML = "A";
          } else if (per >= 70) {
            document.getElementById("grade").innerHTML = "B+";
          } else if (per >= 60) {
            document.getElementById("grade").innerHTML = "B";
          } else if (per >= 35) {
            document.getElementById("grade").innerHTML = "C";
          } else if (per < 35) {
            document.getElementById("grade").innerHTML = "Fail";
          } else {
            document.getElementById("grade").innerHTML = "Enter Valid Data";
          }
        }
      }
    </script>
  </body>
</html>
